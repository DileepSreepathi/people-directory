version: "3.8"
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: src/PeopleDirectory.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=PeopleDirectoryDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"
      Jwt__Secret: "PeopleDirectory-SuperSecret-Key-That-Is-At-Least-256-Bits-Long!"
      Jwt__Issuer: "PeopleDirectoryAPI"
      Jwt__Audience: "PeopleDirectoryClient"
      Email__SmtpHost: "mailhog"
      Email__SmtpPort: "1025"
      Email__FromEmail: "noreply@peopledirectory.com"
      Email__ToEmail: "mark@bluegrassdigital.com"
    ports:
      - "5050:8080"
    volumes:
      - uploads:/app/wwwroot/uploads
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/PeopleDirectory.React/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqldata:
  uploads:
